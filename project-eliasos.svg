<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- Wallpaper grid lines -->
  <line x1="0" y1="60" x2="800" y2="60" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="100" y1="0" x2="100" y2="450" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="300" y1="0" x2="300" y2="450" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="500" y1="0" x2="500" y2="450" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="700" y1="0" x2="700" y2="450" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <!-- Taskbar -->
  <rect x="0" y="408" width="800" height="42" fill="#111820" opacity="0.95"/>
  <rect x="0" y="408" width="800" height="1" fill="#6c63ff" opacity="0.3"/>
  <!-- Start button -->
  <rect x="12" y="416" width="60" height="26" rx="5" fill="#6c63ff" opacity="0.85"/>
  <text x="42" y="433" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">EliasOS</text>
  <!-- Taskbar clock -->
  <text x="760" y="433" font-family="Inter, Arial, sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">12:00</text>
  <!-- Window 1: File Explorer -->
  <rect x="60" y="70" width="340" height="240" rx="8" fill="#111820" stroke="#1e2840" stroke-width="1.5"/>
  <rect x="60" y="70" width="340" height="32" rx="8" fill="#161f2e"/>
  <rect x="60" y="90" width="340" height="12" fill="#161f2e"/>
  <circle cx="80" cy="86" r="6" fill="#ff5f57"/>
  <circle cx="100" cy="86" r="6" fill="#febc2e"/>
  <circle cx="120" cy="86" r="6" fill="#28c840"/>
  <text x="230" y="91" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">Files</text>
  <!-- Sidebar -->
  <rect x="60" y="102" width="80" height="208" fill="#0d1520" opacity="0.8"/>
  <text x="100" y="125" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6c63ff" text-anchor="middle">📁 Home</text>
  <text x="100" y="148" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">🖥 Desktop</text>
  <text x="100" y="171" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">📄 Docs</text>
  <!-- File icons -->
  <rect x="155" y="115" width="50" height="45" rx="4" fill="#1a2535"/>
  <text x="180" y="140" font-family="Arial" font-size="18" text-anchor="middle">📁</text>
  <text x="180" y="157" font-family="Inter, Arial, sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">Projects</text>
  <rect x="215" y="115" width="50" height="45" rx="4" fill="#1a2535"/>
  <text x="240" y="140" font-family="Arial" font-size="18" text-anchor="middle">📝</text>
  <text x="240" y="157" font-family="Inter, Arial, sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">Notes</text>
  <rect x="275" y="115" width="50" height="45" rx="4" fill="#1a2535"/>
  <text x="300" y="140" font-family="Arial" font-size="18" text-anchor="middle">⚙️</text>
  <text x="300" y="157" font-family="Inter, Arial, sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">Settings</text>
  <!-- Window 2: Terminal -->
  <rect x="380" y="100" width="360" height="210" rx="8" fill="#0a0f18" stroke="#1e2840" stroke-width="1.5"/>
  <rect x="380" y="100" width="360" height="32" rx="8" fill="#111820"/>
  <rect x="380" y="120" width="360" height="12" fill="#111820"/>
  <circle cx="400" cy="116" r="6" fill="#ff5f57"/>
  <circle cx="420" cy="116" r="6" fill="#febc2e"/>
  <circle cx="440" cy="116" r="6" fill="#28c840"/>
  <text x="560" y="121" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">Terminal</text>
  <text x="395" y="155" font-family="monospace" font-size="11" fill="#6c63ff">$ elias@os:~</text>
  <text x="395" y="172" font-family="monospace" font-size="11" fill="#28c840">$ ls -la</text>
  <text x="395" y="189" font-family="monospace" font-size="11" fill="#a0a0b0">drwxr-xr-x  projects/</text>
  <text x="395" y="206" font-family="monospace" font-size="11" fill="#a0a0b0">drwxr-xr-x  apps/</text>
  <text x="395" y="223" font-family="monospace" font-size="11" fill="#a0a0b0">-rw-r--r--  readme.md</text>
  <text x="395" y="240" font-family="monospace" font-size="11" fill="#6c63ff">$ <rect x="408" y="228" width="8" height="14" fill="#6c63ff" opacity="0.8"/></text>
  <rect x="408" y="228" width="8" height="14" fill="#6c63ff" opacity="0.8"/>
  <!-- Bottom bar -->
  <rect x="0" y="380" width="800" height="28" fill="#0a0f18" opacity="0.6"/>
  <text x="28" y="398" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6c63ff" opacity="0.8">HTML · CSS · JavaScript · Web</text>
  <text x="640" y="398" font-family="Inter, Arial, sans-serif" font-size="12" fill="#a0a0b0" opacity="0.6">elias-phy-ja.github.io</text>
</svg>
